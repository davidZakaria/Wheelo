[theme]
base = "dark"
primaryColor = "#D4AF37"
backgroundColor = "#061510"
secondaryBackgroundColor = "#0F2419"
textColor = "#F5F0E1"
font = "sans serif"

[server]
headless = true
address = "127.0.0.1"
port = 8503
enableCORS = false
enableXsrfProtection = true
maxUploadSize = 200

[browser]
gatherUsageStats = false
